<a class="account-card"
   [routerLink]="['/clients', clientId(), 'accounts', account().id]"
   [class.blocked]="account().status === 'blocked'"
   [class.closed]="account().status === 'closed'">
  <div class="heading">
    <div>
      <h3>{{ account().label }}</h3>
      <span>{{ typeLabel() }}</span>
    </div>
    <strong>{{ account().balance | formatValue:"currency" }}</strong>
  </div>

  @if (visibleStatusLabel(); as label) {
    <div class="meta">
      <span>{{ label }}</span>
      <span></span>
    </div>
  } @else {
    <div class="meta meta-placeholder" aria-hidden="true">
      <span>&nbsp;</span>
    </div>
  }
</a>
